name: hreftools

services:
  postgres:
    container_name: hreftools-db
    image: postgres:18.2
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hreftools
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
  postgres-test:
    container_name: hreftools-db-test
    image: postgres:18.2
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hreftools_test
    ports:
      - "5433:5432"

volumes:
  postgres_data:
