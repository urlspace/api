version: "2"
sql:
  - engine: "postgresql"
    queries: "sql/queries"
    schema: "sql/migrations"
    gen:
      go:
        package: "db"
        out: "internal/db"
        emit_empty_slices: true
        overrides:
          - column: "resources.created_at"
            go_type:
              type: "time.Time"
          - column: "resources.updated_at"
            go_type:
              type: "time.Time"
          - column: "users.created_at"
            go_type:
              type: "time.Time"
          - column: "users.updated_at"
            go_type:
              type: "time.Time"
          - column: "users.email_verification_token_expires_at"
            go_type:
              type: "time.Time"
              pointer: true
          - column: "tokens.description"
            go_type:
              type: "string"
              pointer: true
          - column: "tokens.expires_at"
            go_type:
              type: "time.Time"
          - column: "tokens.created_at"
            go_type:
              type: "time.Time"
          - column: "tokens.updated_at"
            go_type:
              type: "time.Time"
