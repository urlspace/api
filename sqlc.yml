version: "2"
sql:
  - engine: "postgresql"
    queries: "sql/queries"
    schema: "sql/migrations"
    gen:
      go:
        package: "db"
        out: "internal/db"
        emit_json_tags: true
        json_tags_case_style: "camel"
        emit_interface: true
        emit_empty_slices: true
        overrides:
          - column: "resources.created_at"
            go_type:
              type: "time.Time"
          - column: "resources.updated_at"
            go_type:
              type: "time.Time"
          - column: "users.created_at"
            go_type:
              type: "time.Time"
          - column: "users.updated_at"
            go_type:
              type: "time.Time"
          - column: "users.email_verification_token_expires_at"
            go_type:
              type: "time.Time"
              pointer: true
