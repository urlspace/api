version: "2"
sql:
  - engine: "postgresql"
    queries: "sql/queries"
    schema: "sql/migrations"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "pgx/v5"
        emit_empty_slices: true
        emit_interface: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
            nullable: false
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "NullUUID"
            nullable: true
          - db_type: "timestamptz"
            go_type:
              type: "time.Time"
            nullable: false
          - db_type: "timestamptz"
            go_type:
              type: "time.Time"
              pointer: true
            nullable: true
          - column: "users.email_verification_token_hash"
            go_type:
              type: "string"
              pointer: true
          - column: "users.password_reset_token_hash"
            go_type:
              type: "string"
              pointer: true
          - column: "sessions.description"
            go_type:
              type: "string"
              pointer: true
